<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div>

                <h3>LOCAL</h3>
                <p class="board" id="js-home"></p>
                <div class="btns">
                    <button class="btn btn1" onclick="countersum(1, 0)">+1</button>
                    <button class="btn" onclick="countersum(2, 0)">+2</button>
                    <button class="btn" onclick="countersum(3, 0)">+3</button>
                </div>
            </div>
            <div>
                <h3>VISITANTE</h3>
                <p class="board" id="js-away"></p>
                <div class="btns">
                    <button class="btn btn1" onclick="countersum(0, 1)">+1</button>
                    <button class="btn" onclick="countersum(0, 2)">+2</button>
                    <button class="btn" onclick="countersum(0, 3)">+3</button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
